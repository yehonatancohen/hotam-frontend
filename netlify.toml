[build]
  command = "npm run build"
  publish = "dist"

# SPA: send all routes to index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security & SEO headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-term cache for hashed assets (JS/CSS bundles)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No-cache for HTML so updates are instant
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache sitemap & robots briefly
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# These are public config values (API URLs), not real secrets
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_URL,VITE_STATIC_BASE,VITE_UPLOAD_URL,VITE_FRONTEND_URL"
